<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Bubble Monster Duo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 15% 10%, rgba(67,199,255,.36), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255,230,109,.18), transparent 24%),
        linear-gradient(135deg, #10192f, #25547a);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .wrap {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
      align-items: start;
    }
    .stage, .panel {
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 24px;
      box-shadow: 0 20px 70px rgba(0,0,0,.25);
      backdrop-filter: blur(14px);
    }
    .stage { padding: 16px; }
    .panel { padding: 16px; margin-bottom: 12px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(23px, 3vw, 34px);
      letter-spacing: -.04em;
      line-height: 1.1;
    }
    .sub {
      margin-top: 5px;
      color: #cde3f6;
      font-size: 14px;
    }
    .pill {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(0,0,0,.2);
      border: 1px solid rgba(255,255,255,.2);
      font-weight: 900;
      white-space: nowrap;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 3px solid rgba(255,255,255,.65);
      background: #dff8ff;
      outline: none;
    }
    h2 { margin: 0 0 10px; font-size: 18px; }
    input {
      width: 100%;
      border: 0;
      border-radius: 13px;
      padding: 12px 13px;
      margin-bottom: 10px;
      font-weight: 800;
      font-size: 15px;
      color: #12213e;
      text-transform: uppercase;
    }
    button {
      border: 0;
      cursor: pointer;
      padding: 11px 14px;
      border-radius: 14px;
      font-weight: 900;
      color: #12213e;
      background: linear-gradient(180deg, #fff, #d8f6ff);
      box-shadow: 0 8px 20px rgba(0,0,0,.22), inset 0 -3px 0 rgba(0,0,0,.1);
    }
    button.secondary { background: linear-gradient(180deg, #fff7d1, #ffe66d); }
    button:active { transform: translateY(1px); }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; }
    .row {
      display: flex;
      justify-content: space-between;
      color: #cde3f6;
      line-height: 1.8;
      font-size: 14px;
      gap: 12px;
    }
    .row strong { color: #fff; }
    .player-card {
      margin-top: 10px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.14);
    }
    .life { color: #ff7aa9; font-size: 17px; letter-spacing: 1px; }
    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      margin: 2px;
      padding: 0 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.3);
      color: white;
      font-weight: 900;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.22);
    }
    .note, .log {
      color: #cde3f6;
      line-height: 1.62;
      font-size: 13px;
    }
    .log {
      margin-top: 12px;
      min-height: 76px;
      padding: 12px;
      border-radius: 15px;
      background: rgba(0,0,0,.18);
      color: #fff;
      font-size: 14px;
    }
    .room-code {
      font-size: 32px;
      font-weight: 950;
      letter-spacing: .12em;
      text-align: center;
      padding: 10px;
      margin: 8px 0 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.16);
    }
    @media (max-width: 940px) {
      body { align-items: start; }
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="stage">
      <header>
        <div>
          <h1>Online Bubble Monster Duo</h1>
          <div class="sub">방 코드로 접속하는 온라인 2인용 물폭탄 몬스터 게임</div>
        </div>
        <div class="pill" id="waveText">대기 중</div>
      </header>
      <canvas id="game" width="660" height="572" tabindex="0"></canvas>
    </section>

    <aside>
      <section class="panel">
        <h2>방 접속</h2>
        <div class="room-code" id="roomCode">----</div>
        <div class="btns">
          <button id="createBtn">방 만들기</button>
          <button id="startBtn" class="secondary">게임 시작</button>
        </div>
        <input id="joinInput" maxlength="4" placeholder="방 코드 입력" />
        <div class="btns">
          <button id="joinBtn">방 입장</button>
          <button id="restartBtn">재시작</button>
        </div>
        <div class="log" id="msg">방을 만들거나, 친구가 만든 방 코드로 입장하세요.</div>
      </section>

      <section class="panel">
        <h2>내 정보</h2>
        <div class="row"><span>내 역할</span><strong id="roleText">미접속</strong></div>
        <div class="row"><span>상태</span><strong id="statusText">대기</strong></div>
      </section>

      <section class="panel">
        <h2>플레이어</h2>
        <div class="player-card">
          <div class="row"><span>1P BLUE</span><strong id="p1Conn">OFF</strong></div>
          <div class="life" id="p1Life">❤❤❤❤❤</div>
          <div class="row"><span>점수</span><strong id="p1Score">0</strong></div>
          <div class="row"><span>폭탄 / 사거리</span><strong id="p1Power">1 / 2</strong></div>
        </div>
        <div class="player-card">
          <div class="row"><span>2P PINK</span><strong id="p2Conn">OFF</strong></div>
          <div class="life" id="p2Life">❤❤❤❤❤</div>
          <div class="row"><span>점수</span><strong id="p2Score">0</strong></div>
          <div class="row"><span>폭탄 / 사거리</span><strong id="p2Power">1 / 2</strong></div>
        </div>
      </section>

      <section class="panel">
        <h2>조작법</h2>
        <p class="note">
          이동: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 또는 <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd><br>
          물폭탄: <kbd>Space</kbd><br><br>
          키 한 번을 누르면 한 칸 이동합니다.
        </p>
      </section>
    </aside>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (() => {
      "use strict";

      const socket = io();
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const TILE = 44;
      const EMPTY = 0;
      const WALL = 1;
      const CRATE = 2;

      let myRole = null;
      let latest = null;

      const ui = {
        waveText: document.getElementById("waveText"),
        roomCode: document.getElementById("roomCode"),
        msg: document.getElementById("msg"),
        createBtn: document.getElementById("createBtn"),
        startBtn: document.getElementById("startBtn"),
        joinBtn: document.getElementById("joinBtn"),
        restartBtn: document.getElementById("restartBtn"),
        joinInput: document.getElementById("joinInput"),
        roleText: document.getElementById("roleText"),
        statusText: document.getElementById("statusText"),
        p1Conn: document.getElementById("p1Conn"),
        p2Conn: document.getElementById("p2Conn"),
        p1Life: document.getElementById("p1Life"),
        p2Life: document.getElementById("p2Life"),
        p1Score: document.getElementById("p1Score"),
        p2Score: document.getElementById("p2Score"),
        p1Power: document.getElementById("p1Power"),
        p2Power: document.getElementById("p2Power")
      };

      function message(text) {
        ui.msg.textContent = text;
      }

      ui.createBtn.addEventListener("click", () => {
        socket.emit("createRoom", (res) => {
          if (!res.ok) return message(res.error || "방 만들기에 실패했습니다.");
          myRole = res.slot;
          message(`방 생성 완료. 친구에게 코드 ${res.code}를 알려주세요.`);
          canvas.focus();
        });
      });

      ui.joinBtn.addEventListener("click", () => {
        const code = ui.joinInput.value.trim().toUpperCase();
        if (!code) return message("방 코드를 입력해주세요.");
        socket.emit("joinRoom", code, (res) => {
          if (!res.ok) return message(res.error || "방 입장에 실패했습니다.");
          myRole = res.slot;
          message(`${code} 방에 입장했습니다.`);
          canvas.focus();
        });
      });

      ui.startBtn.addEventListener("click", () => {
        socket.emit("startGame");
        canvas.focus();
      });

      ui.restartBtn.addEventListener("click", () => {
        socket.emit("restartGame");
        canvas.focus();
      });

      socket.on("state", (state) => {
        latest = state;
        updateUI(state);
      });

      socket.on("connect", () => {
        message("서버에 연결되었습니다. 방을 만들거나 입장하세요.");
      });

      socket.on("disconnect", () => {
        message("서버 연결이 끊겼습니다. 배포 서버 상태를 확인하세요.");
      });

      window.addEventListener("keydown", (e) => {
        const gameKeys = ["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyW","KeyA","KeyS","KeyD"];
        if (gameKeys.includes(e.code)) e.preventDefault();

        if (!latest || latest.status !== "playing") return;

        if (e.code === "Space") socket.emit("bomb");
        if (e.code === "KeyW" || e.code === "ArrowUp") socket.emit("move", { dx: 0, dy: -1 });
        if (e.code === "KeyS" || e.code === "ArrowDown") socket.emit("move", { dx: 0, dy: 1 });
        if (e.code === "KeyA" || e.code === "ArrowLeft") socket.emit("move", { dx: -1, dy: 0 });
        if (e.code === "KeyD" || e.code === "ArrowRight") socket.emit("move", { dx: 1, dy: 0 });
      }, { passive: false });

      function updateUI(s) {
        ui.roomCode.textContent = s.code || "----";
        ui.waveText.textContent = s.status === "playing" ? `WAVE ${s.wave}` : statusLabel(s.status);
        ui.roleText.textContent = myRole ? (myRole === "p1" ? "1P BLUE" : "2P PINK") : "미접속";
        ui.statusText.textContent = statusLabel(s.status);

        const p1 = s.players.p1;
        const p2 = s.players.p2;

        ui.p1Conn.textContent = p1.connected ? "ON" : "OFF";
        ui.p2Conn.textContent = p2.connected ? "ON" : "OFF";

        ui.p1Life.textContent = hearts(p1.life, p1.maxLife);
        ui.p2Life.textContent = hearts(p2.life, p2.maxLife);
        ui.p1Score.textContent = p1.score;
        ui.p2Score.textContent = p2.score;
        ui.p1Power.textContent = `${p1.bombMax} / ${p1.range}`;
        ui.p2Power.textContent = `${p2.bombMax} / ${p2.range}`;

        if (s.messages && s.messages[0]) message(s.messages[0].text);
      }

      function statusLabel(status) {
        if (status === "waiting") return "대기 중";
        if (status === "playing") return "플레이 중";
        if (status === "gameover") return "게임 오버";
        return status;
      }

      function hearts(life, max) {
        return "❤".repeat(Math.max(0, life)) + "♡".repeat(Math.max(0, max - life));
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!latest) {
          drawOverlay("ONLINE DUO", "방을 만들거나 친구의 방 코드로 입장하세요.");
          requestAnimationFrame(draw);
          return;
        }

        drawBoard(latest);
        drawItems(latest);
        drawBombs(latest);
        drawBlasts(latest);
        drawMonsters(latest);
        drawPlayers(latest);

        if (latest.status !== "playing") {
          drawOverlay(statusLabel(latest.status), latest.status === "waiting" ? "두 명이 접속하면 게임 시작을 누르세요." : "재시작 버튼으로 다시 시작할 수 있습니다.");
        }

        requestAnimationFrame(draw);
      }

      function drawBoard(s) {
        const cols = s.constants.cols;
        const rows = s.constants.rows;
        const w = cols * TILE;
        const h = rows * TILE;

        const bg = ctx.createLinearGradient(0,0,w,h);
        bg.addColorStop(0,"#e8fbff");
        bg.addColorStop(1,"#a9e8ff");
        ctx.fillStyle = bg;
        roundRect(0,0,w,h,20);
        ctx.fill();

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const px = x * TILE;
            const py = y * TILE;
            ctx.fillStyle = (x + y) % 2 === 0 ? "rgba(255,255,255,.25)" : "rgba(0,95,135,.05)";
            roundRect(px+3, py+3, TILE-6, TILE-6, 12);
            ctx.fill();

            if (s.grid[y][x] === WALL) drawWall(px, py);
            if (s.grid[y][x] === CRATE) drawCrate(px, py);
          }
        }
      }

      function drawWall(px, py) {
        const g = ctx.createLinearGradient(px, py, px, py + TILE);
        g.addColorStop(0, "#5d86c9");
        g.addColorStop(1, "#2f5597");
        ctx.fillStyle = g;
        roundRect(px+5, py+5, TILE-10, TILE-10, 12);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,.22)";
        roundRect(px+10, py+9, TILE-20, 8, 8);
        ctx.fill();
      }

      function drawCrate(px, py) {
        const g = ctx.createLinearGradient(px, py, px, py + TILE);
        g.addColorStop(0, "#f7bd68");
        g.addColorStop(1, "#b87539");
        ctx.fillStyle = g;
        roundRect(px+6, py+7, TILE-12, TILE-14, 10);
        ctx.fill();

        ctx.strokeStyle = "rgba(82,43,14,.35)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(px+11, py+14);
        ctx.lineTo(px+TILE-11, py+TILE-14);
        ctx.moveTo(px+TILE-11, py+14);
        ctx.lineTo(px+11, py+TILE-14);
        ctx.stroke();
      }

      function drawPlayers(s) {
        for (const p of Object.values(s.players)) {
          if (!p.connected || p.life <= 0) continue;
          if (p.inv > 0 && Math.floor(performance.now() / 120) % 2 === 0) continue;

          const cx = (p.tileX + 0.5) * TILE;
          const cy = (p.tileY + 0.5) * TILE;
          drawCharacter(cx, cy, p.color, p.id === "p1" ? "1P" : "2P", p.dirX, p.dirY);
        }
      }

      function drawCharacter(cx, cy, color, label, dirX, dirY) {
        ctx.save();
        ctx.translate(cx, cy);

        ctx.fillStyle = "rgba(0,0,0,.15)";
        ctx.beginPath();
        ctx.ellipse(0,17,17,5,0,0,Math.PI*2);
        ctx.fill();

        const g = ctx.createRadialGradient(-8,-12,3,0,0,24);
        g.addColorStop(0,"#ffffff");
        g.addColorStop(.45,color);
        g.addColorStop(1,"#17315b");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0,0,20,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(-7,-4,5,0,Math.PI*2);
        ctx.arc(7,-4,5,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "#14213d";
        ctx.beginPath();
        ctx.arc(-6 + dirX*1.6, -3 + dirY*1.2, 2.2, 0, Math.PI*2);
        ctx.arc(8 + dirX*1.6, -3 + dirY*1.2, 2.2, 0, Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = "#14213d";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(0,5,7,.12*Math.PI,.88*Math.PI);
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = "900 11px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(label, 0, -28);
        ctx.restore();
      }

      function drawMonsters(s) {
        for (const m of s.monsters) {
          const cx = (m.tileX + 0.5) * TILE;
          const cy = (m.tileY + 0.5) * TILE;
          ctx.save();
          ctx.translate(cx, cy);

          ctx.fillStyle = "rgba(0,0,0,.14)";
          ctx.beginPath();
          ctx.ellipse(0,17,18,5,0,0,Math.PI*2);
          ctx.fill();

          ctx.fillStyle = m.color;
          ctx.beginPath();
          ctx.arc(0,0,19,0,Math.PI*2);
          ctx.fill();

          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(-7,-3,5,0,Math.PI*2);
          ctx.arc(7,-3,5,0,Math.PI*2);
          ctx.fill();

          ctx.fillStyle = "#111827";
          ctx.beginPath();
          ctx.arc(-7,-2,2,0,Math.PI*2);
          ctx.arc(7,-2,2,0,Math.PI*2);
          ctx.fill();

          ctx.strokeStyle = "#111827";
          ctx.lineWidth = 2;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(-6,8);
          ctx.quadraticCurveTo(0,12,6,8);
          ctx.stroke();

          if (m.maxHp > 1) {
            ctx.fillStyle = "rgba(0,0,0,.25)";
            ctx.fillRect(-14,-27,28,4);
            ctx.fillStyle = "#8cf7a2";
            ctx.fillRect(-14,-27,28*(m.hp/m.maxHp),4);
          }
          ctx.restore();
        }
      }

      function drawBombs(s) {
        for (const b of s.bombs) {
          const cx = (b.x + 0.5) * TILE;
          const cy = (b.y + 0.5) * TILE;
          const danger = b.timer < 0.45;
          ctx.save();
          ctx.translate(cx, cy);

          const g = ctx.createRadialGradient(-8,-8,2,0,0,21);
          g.addColorStop(0,"#fff");
          g.addColorStop(.25,danger ? "#ffdddf" : "#d8fbff");
          g.addColorStop(1,danger ? "#ff6b6b" : "#34c3eb");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(0,0,17,0,Math.PI*2);
          ctx.fill();

          ctx.restore();
        }
      }

      function drawBlasts(s) {
        for (const b of s.blasts) {
          const a = Math.max(0, b.timer / b.max);
          for (const c of b.cells) {
            const cx = (c.x + 0.5) * TILE;
            const cy = (c.y + 0.5) * TILE;
            const r = 22 + Math.sin(a * Math.PI) * 9;

            ctx.save();
            ctx.globalAlpha = .28 + a * .72;
            const g = ctx.createRadialGradient(cx,cy,2,cx,cy,r);
            g.addColorStop(0,"#fff");
            g.addColorStop(.36,"#7ee8fa");
            g.addColorStop(1,"rgba(30,144,255,.15)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx,cy,r,0,Math.PI*2);
            ctx.fill();
            ctx.restore();
          }
        }
      }

      function drawItems(s) {
        for (const it of s.items) {
          const cx = (it.x + 0.5) * TILE;
          const cy = (it.y + 0.5) * TILE + Math.sin(performance.now()/250) * 4;
          const color = it.type === "range" ? "#7ee8fa" : it.type === "bomb" ? "#ffe66d" : "#ff7aa9";

          ctx.save();
          ctx.translate(cx, cy);
          const g = ctx.createRadialGradient(-6,-8,3,0,0,18);
          g.addColorStop(0,"#fff");
          g.addColorStop(.38,color);
          g.addColorStop(1,"#2f5597");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(0,0,17,0,Math.PI*2);
          ctx.fill();

          ctx.fillStyle = "#14213d";
          ctx.font = "900 11px system-ui";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(it.type === "range" ? "R" : it.type === "bomb" ? "B" : "❤",0,1);
          ctx.restore();
        }
      }

      function drawOverlay(title, sub) {
        ctx.save();
        ctx.fillStyle = "rgba(12,23,45,.62)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 48px system-ui";
        ctx.fillText(title, canvas.width/2, canvas.height/2 - 28);
        ctx.font = "700 18px system-ui";
        ctx.fillStyle = "#d8f6ff";
        ctx.fillText(sub, canvas.width/2, canvas.height/2 + 25);
        ctx.restore();
      }

      function roundRect(x,y,w,h,r) {
        const rr = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+rr,y);
        ctx.arcTo(x+w,y,x+w,y+h,rr);
        ctx.arcTo(x+w,y+h,x,y+h,rr);
        ctx.arcTo(x,y+h,x,y,rr);
        ctx.arcTo(x,y,x+w,y,rr);
        ctx.closePath();
      }

      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
